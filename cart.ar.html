<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكسير الطبيعة | السلة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* تصميم خاص بصفحة السلة فقط لتكون احترافية */
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            gap: 10px;
        }
        .item-info {
            flex: 2;
        }
        .item-info h4 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 1rem;
            font-weight: bold;
        }
        .item-info small {
            color: #7f8c8d;
            font-size: 0.85rem;
        }
        .item-total {
            color: #27ae60;
            font-weight: 900;
            font-size: 1.1rem;
            text-align: left;
            min-width: 70px;
        }
        .delete-btn {
            background: #ffeaa7;
            color: #e74c3c;
            border: none;
            width: 35px; height: 35px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }
        
        /* فاتورة المجموع المبدئي */
        .cart-subtotal-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 2px dashed #27ae60;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <header style="text-align: center; padding: 20px 0;">
        <div class="logo-container">
    <h1 class="glowing-logo">Nature's Elixir</h1>
</div>
    </header>

    <nav class="nav-bar-horizontal">
        <div class="nav-item" onclick="location.href='index.html'"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="location.href='categories.ar.html'"><i class="fas fa-leaf"></i><span>التسوق</span></div>
        <div class="nav-item cart-nav" onclick="location.href='cart.ar.html'"><i class="fas fa-shopping-basket"></i><span id="cart-count" class="cart-badge">0</span><span>السلة</span></div>
    </nav>

    <section id="cart-review-page" class="active" style="padding: 15px; padding-bottom: 80px;">
        <h2 class="section-title" style="text-align: center; color: #2c3e50; margin-bottom: 20px;">🛒 مراجعة السلة</h2>
        
        <div id="cart-items-container">
            </div>

        <div id="subtotal-container">
            </div>

        <div class="cart-summary-btns" style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px;">
            <button class="confirm-btn glow-effect" onclick="location.href='checkout.ar.html'" style="background: #27ae60; color: white; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; border: none; width: 100%;">
                الذهاب لبيانات التوصيل ←
            </button>
            <button class="main-btn" onclick="location.href='categories.ar.html'" style="background: #ecf0f1; color: #2c3e50; padding: 12px; border-radius: 8px; font-weight: bold; border: none; width: 100%;">
                + إضافة منتجات أخرى
            </button>
        </div>
    </section>

    <footer class="fixed-footer" style="text-align: center; padding: 15px; color: #7f8c8d; font-size: 0.9rem;">جميع الحقوق محفوظة لـ إكسير الطبيعة 2026</footer>

    <script src="script.js"></script>
    <script>
        // دالة لعرض المنتجات في السلة وإضافة الإجمالي
        function renderCart() {
            const cartItems = JSON.parse(localStorage.getItem('userCart')) || [];
            const container = document.getElementById('cart-items-container');
            const subtotalContainer = document.getElementById('subtotal-container');
            const confirmBtn = document.querySelector('.confirm-btn');
            
            if (!container) return;

            if (cartItems.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#95a5a6; padding:50px 20px;"><i class="fas fa-shopping-basket" style="font-size: 4rem; color: #ecf0f1; margin-bottom: 15px; display: block;"></i>سلتك فارغة حالياً.. اذهب لتسوق أطازج المنتجات! 🥦</div>';
                subtotalContainer.innerHTML = '';
                confirmBtn.style.display = 'none'; // إخفاء زر التوصيل لو السلة فاضية
                updateCartBadge();
                return;
            }

            confirmBtn.style.display = 'block';
            let subtotal = 0;

            container.innerHTML = cartItems.map(item => {
                const itemTotal = Number(item.qty) * Number(item.price);
                subtotal += itemTotal;
                
                return `
                <div class="cart-item">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <small>${Number(item.price).toFixed(2)} ج.م / K.g</small>
                    </div>
                    
                    <div class="qty-wrapper" style="margin:0; padding:2px; min-width: 90px;">
                        <button class="qty-btn" onclick="updateQtyInCart(${item.id}, 1)">+</button>
                        <input type="text" class="qty-input" value="${item.qty}" lang="en" readonly style="direction: ltr !important; font-family: 'Arial', sans-serif !important; width: 30px;">
                        <button class="qty-btn" onclick="updateQtyInCart(${item.id}, -1)">-</button>
                    </div>

                    <div class="item-total">
                        ${itemTotal.toFixed(2)}
                    </div>

                    <button class="delete-btn" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `}).join('');

            // عرض الإجمالي المبدئي
            subtotalContainer.innerHTML = `
                <div class="cart-subtotal-box">
                    <strong>الإجمالي المبدئي:</strong>
                    <strong style="color: #27ae60; font-size: 1.4rem;" lang="en" dir="ltr">${subtotal.toFixed(2)} EGP</strong>
                </div>
            `;

            updateCartBadge(); // تحديث الرقم اللي في شريط التنقل
        }

        // دالة تحديث الكمية داخل السلة
        function updateQtyInCart(id, change) {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            const item = cart.find(i => i.id === id);
            if (item) {
                let newQty = Number(item.qty) + change;
                if (newQty <= 0) {
                    removeFromCart(id);
                    return;
                }
                item.qty = newQty;
                item.total = item.qty * Number(item.price);
                localStorage.setItem('userCart', JSON.stringify(cart));
                renderCart();
            }
        }

        // دالة حذف منتج بالكامل من السلة
        function removeFromCart(id) {
            let cart = JSON.parse(localStorage.getItem('userCart')) || [];
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('userCart', JSON.stringify(cart));
            renderCart();
        }

        // تشغيل العرض عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
