<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة | إكسير الطبيعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-card i { font-size: 3rem; color: #27ae60; margin-bottom: 20px; }
        .login-card h2 { margin-bottom: 30px; color: #2c3e50; }
        .form-group { margin-bottom: 20px; text-align: right; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; text-align: center; }
        .btn-login { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-login:hover { background: #219150; }
        .error-msg { color: #e74c3c; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <i class="fas fa-user-shield"></i>
        <h2>دخول الإدارة</h2>
        <div class="form-group">
            <input type="password" id="admin-pass" placeholder="أدخل كلمة المرور">
        </div>
        <button class="btn-login" onclick="checkLogin()">دخول ✅</button>
        <p class="error-msg" id="login-error">كلمة المرور غير صحيحة!</p>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            // كلمة السر الثابتة هي admin123 (يمكنك تغييرها من هنا)
            if (pass === "admin123") {
                sessionStorage.setItem('admin_auth', 'true');
                window.location.href = "admin-index.html";
            } else {
                document.getElementById('login-error').style.display = "block";
            }
        }
        // منع الدخول إذا كان مسجلاً مسبقاً
        if (sessionStorage.getItem('admin_auth') === 'true') { window.location.href = "admin-index.html"; }
    </script>
</body>
</html>
