<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدماتنا | إكسير الطبيعة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
    <h1 class="glowing-logo">Nature's Elixir</h1>
</div>
<style>
    .btn-elixir {
        padding: 10px 20px;
        border: 2px solid #27ae60;
        color: #27ae60;
        border-radius: 8px;
        cursor: pointer;
        display: inline-block;
        transition: 0.3s;
        font-family: 'Cairo', sans-serif;
    }
    .btn-elixir:hover {
        background: #27ae60;
        color: white;
    }
</style>

<div class="btn-elixir" onclick="location.href='index.html'">
    <i class="fas fa-home"></i> الرئيسية
</div>
        </nav>
    </header>

    <section class="active">
        <h2 style="text-align:center; color:var(--primary); font-size:2.5rem;">ماذا نقدم لك؟</h2>
        <div class="grid">
            <div class="card">
                <i class="fas fa-truck-fast" style="font-size:3rem; color:var(--primary)"></i>
                <h3>توصيل فائق السرعة</h3>
                <p>نصلك في خلال ساعتين فقط من طلبك.</p>
            </div>
            <div class="card">
                <i class="fas fa-check-double" style="font-size:3rem; color:var(--primary)"></i>
                <h3>فرز أول ممتاز</h3>
                <p>كل حبة خضار أو فاكهة يتم فحصها يدوياً لضمان أعلى جودة.</p>
            </div>
            <div class="card">
                <i class="fas fa-hand-holding-dollar" style="font-size:3rem; color:var(--primary)"></i>
                <h3>الدفع عند الاستلام</h3>
                <p>لا تقلق، افحص طلبك جيداً ثم ادفع كاش أو عبر محفظة إلكترونية.</p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
